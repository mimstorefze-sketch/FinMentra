<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinMentra — Signing you in...</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0A1F6E;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .logo { font-size: 28px; font-weight: 800; color: #fff; }
    .logo span { color: #F59E0B; }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { color: rgba(255,255,255,0.8); font-size: 15px; font-weight: 500; }
    .error { color: #FCA5A5; font-size: 14px; text-align: center; max-width: 300px; line-height: 1.5; display: none; }
    .btn {
      display: none;
      padding: 12px 28px;
      background: #F59E0B;
      color: #0A1F6E;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="logo">Fin<span>Mentra</span></div>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Signing you in...</div>
  <div class="error" id="error"></div>
  <button class="btn" id="btn" onclick="window.location.href='https://www.finmentra.com'">Go to App</button>

  <script>
    const SUPA_URL = 'https://vofxhqnipoywbbkmlxcp.supabase.co';
    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvZnhocW5pcG95d2Jia21seGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5Nzk3ODUsImV4cCI6MjA5MzU1NTc4NX0.7UDDR3oNoiebxMQPR_jPHM8fOhhOzQ2MxpmR7TpBCHQ';

    const _supa = supabase.createClient(SUPA_URL, SUPA_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        storageKey: 'sb-vofxhqnipoywbbkmlxcp-auth-token',
        storage: window.localStorage
      }
    });

    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('msg').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = msg;
      document.getElementById('btn').style.display = 'block';
    }

    async function handleCallback() {
      try {
        // Let Supabase handle the session from URL automatically
        const { data, error } = await _supa.auth.getSession();

        if (error) {
          showError('Login failed: ' + error.message);
          return;
        }

        if (data && data.session) {
          document.getElementById('msg').textContent = 'Signed in! Redirecting...';
          // Small delay then redirect to main app
          setTimeout(function() {
            window.location.replace('https://www.finmentra.com');
          }, 800);
          return;
        }

        // No session yet — Supabase is still processing the URL hash
        // Wait a moment and try again
        setTimeout(async function() {
          const { data: data2 } = await _supa.auth.getSession();
          if (data2 && data2.session) {
            document.getElementById('msg').textContent = 'Signed in! Redirecting...';
            setTimeout(function() {
              window.location.replace('https://www.finmentra.com');
            }, 500);
          } else {
            // Redirect anyway — main app will check session
            window.location.replace('https://www.finmentra.com');
          }
        }, 1500);

      } catch(e) {
        showError('Something went wrong. Please try again.');
        console.error(e);
      }
    }

    handleCallback();
  </script>
</body>
</html>
