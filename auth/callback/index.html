<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinMentra — Signing you in...</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0A1F6E;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:24px;}
    .logo{font-size:28px;font-weight:800;color:#fff;}
    .logo span{color:#F59E0B;}
    .spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .msg{color:rgba(255,255,255,0.8);font-size:15px;font-weight:500;text-align:center;max-width:300px;line-height:1.6;}
    .btn{padding:12px 28px;background:#F59E0B;color:#0A1F6E;border:none;border-radius:999px;font-size:14px;font-weight:700;cursor:pointer;display:none;}
  </style>
</head>
<body>
  <div class="logo">Fin<span>Mentra</span></div>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Signing you in...</div>
  <button class="btn" id="btn" onclick="window.location.replace('https://www.finmentra.com')">Open FinMentra</button>
  <script>
    var SUPA_URL='https://vofxhqnipoywbbkmlxcp.supabase.co';
    var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvZnhocW5pcG95d2Jia21seGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5Nzk3ODUsImV4cCI6MjA5MzU1NTc4NX0.7UDDR3oNoiebxMQPR_jPHM8fOhhOzQ2MxpmR7TpBCHQ';
    var STORAGE_KEY='sb-vofxhqnipoywbbkmlxcp-auth-token';

    function done(){
      document.getElementById('spinner').style.display='none';
      document.getElementById('msg').textContent='Signed in! Opening app...';
      document.getElementById('btn').style.display='block';
      setTimeout(function(){ window.location.replace('https://www.finmentra.com'); },1000);
    }

    function fail(msg){
      document.getElementById('spinner').style.display='none';
      document.getElementById('msg').textContent=msg||'Login failed. Please try again.';
      document.getElementById('btn').style.display='block';
    }

    // Initialize Supabase with PKCE support
    var _supa=supabase.createClient(SUPA_URL,SUPA_KEY,{
      auth:{
        persistSession:true,
        autoRefreshToken:true,
        detectSessionInUrl:true,
        flowType:'pkce',
        storageKey:STORAGE_KEY,
        storage:window.localStorage
      }
    });

    // Supabase automatically exchanges the code in the URL
    // onAuthStateChange fires when it's done
    var redirected=false;
    _supa.auth.onAuthStateChange(function(event,session){
      if(redirected) return;
      if(session && (event==='SIGNED_IN'||event==='INITIAL_SESSION'||event==='TOKEN_REFRESHED')){
        redirected=true;
        done();
      }
    });

    // Also check immediately
    _supa.auth.getSession().then(function(r){
      if(redirected) return;
      if(r.data&&r.data.session){
        redirected=true;
        done();
        return;
      }
      // If no session after 4 seconds, show button
      setTimeout(function(){
        if(!redirected){
          // Check one more time
          _supa.auth.getSession().then(function(r2){
            if(r2.data&&r2.data.session){
              redirected=true;
              done();
            } else {
              fail('Taking longer than expected. Tap below to continue.');
            }
          });
        }
      },4000);
    });
  </script>
</body>
</html>
