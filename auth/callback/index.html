<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinMentra — Signing you in...</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0A1F6E;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:24px;}
    .logo{font-size:28px;font-weight:800;color:#fff;}
    .logo span{color:#F59E0B;}
    .spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .msg{color:rgba(255,255,255,0.8);font-size:15px;font-weight:500;text-align:center;}
    .error{color:#FCA5A5;font-size:13px;text-align:center;max-width:300px;line-height:1.5;display:none;}
    .btn{display:none;padding:12px 28px;background:#F59E0B;color:#0A1F6E;border:none;border-radius:999px;font-size:14px;font-weight:700;cursor:pointer;}
  </style>
</head>
<body>
  <div class="logo">Fin<span>Mentra</span></div>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Signing you in...</div>
  <div class="error" id="error"></div>
  <button class="btn" id="btn" onclick="window.location.replace('https://www.finmentra.com')">Go to App</button>
  <script>
    var SUPA_URL='https://vofxhqnipoywbbkmlxcp.supabase.co';
    var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvZnhocW5pcG95d2Jia21seGNwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5Nzk3ODUsImV4cCI6MjA5MzU1NTc4NX0.7UDDR3oNoiebxMQPR_jPHM8fOhhOzQ2MxpmR7TpBCHQ';
    var STORAGE_KEY='sb-vofxhqnipoywbbkmlxcp-auth-token';

    function redirectToApp(){
      document.getElementById('msg').textContent='Signed in! Redirecting...';
      document.getElementById('spinner').style.display='none';
      setTimeout(function(){ window.location.replace('https://www.finmentra.com'); },600);
    }

    function showError(msg){
      document.getElementById('spinner').style.display='none';
      document.getElementById('error').style.display='block';
      document.getElementById('error').textContent=msg;
      document.getElementById('btn').style.display='block';
    }

    var _supa=supabase.createClient(SUPA_URL,SUPA_KEY,{
      auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,storageKey:STORAGE_KEY,storage:window.localStorage}
    });

    // Listen for Supabase to process the URL automatically
    _supa.auth.onAuthStateChange(function(event,session){
      if((event==='SIGNED_IN'||event==='TOKEN_REFRESHED')&&session){
        redirectToApp();
      }
    });

    // Fallback after 2 seconds
    setTimeout(function(){
      _supa.auth.getSession().then(function(result){
        if(result.data&&result.data.session){
          redirectToApp();
          return;
        }
        // Manual hash extraction fallback
        var hash=window.location.hash.substring(1);
        var params=new URLSearchParams(hash);
        var query=new URLSearchParams(window.location.search);
        var accessToken=params.get('access_token')||query.get('access_token');
        var error=params.get('error')||query.get('error');

        if(error){
          showError('Login failed: '+(params.get('error_description')||error));
        } else if(accessToken){
          var sessionData={
            access_token:accessToken,
            refresh_token:params.get('refresh_token')||'',
            token_type:'bearer',
            expires_in:parseInt(params.get('expires_in')||'3600'),
            expires_at:parseInt(params.get('expires_at')||(Math.floor(Date.now()/1000)+3600))
          };
          localStorage.setItem(STORAGE_KEY,JSON.stringify(sessionData));
          redirectToApp();
        } else {
          // No token — just go home, main app will check session
          window.location.replace('https://www.finmentra.com');
        }
      });
    },2000);
  </script>
</body>
</html>
